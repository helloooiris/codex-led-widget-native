name: Release macOS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag
        required: true
        default: v0.3.0

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install icon dependency
        run: |
          python3 -m venv .venv
          .venv/bin/pip install Pillow
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Build macOS app
        run: bash ./scripts/package-macos-app.sh

      - name: Create clean release archive
        run: >-
          ditto -c -k --norsrc --keepParent
          './publish/Codex LED Widget.app'
          './publish/Codex-LED-Widget-macOS-arm64.zip'

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          notes_file="$(mktemp)"
          cat > "$notes_file" <<'EOF'
          ## macOS v0.3.0

          - 适配新版 Codex 动态额度池，不再依赖固定 5 小时窗口
          - 兼容 Plus、Pro 以及旧版 5 小时/7 天双窗口返回
          - 支持独立模型额度池，并按实际窗口或模型名称显示
          - 服务端提供时显示可用额度重置次数
          - 保留每 10 秒自动同步、到点刷新和丝滑窗口动画
          - 自包含 .app，无需另外安装 .NET Runtime

          ### 安装

          1. 下载 `Codex-LED-Widget-macOS-arm64.zip`
          2. 解压后将 `Codex LED Widget.app` 拖入“应用程序”目录
          3. 确保本机已安装并登录 Codex CLI
          4. 首次启动若被 macOS 拦截，请在 Finder 中右键应用并选择“打开”

          > 当前安装包适用于 Apple Silicon Mac（M1/M2/M3/M4 系列）。
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Codex LED Widget $TAG" --notes-file "$notes_file" --latest
            gh release upload "$TAG" './publish/Codex-LED-Widget-macOS-arm64.zip' --clobber
          else
            gh release create "$TAG" './publish/Codex-LED-Widget-macOS-arm64.zip' \
              --title "Codex LED Widget $TAG" \
              --notes-file "$notes_file" \
              --latest
          fi
